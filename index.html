<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/main.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="assets/lib/app.js"></script>
    <script src="./assets/lib/enemy.js"></script>
    <title>Fate: Idle Game</title>
</head>
<body>
    <div class="content">

        <div class="menus">
            <div class="main">
                <button id="director" title="Go out on patrol">Director</button>
                <button id="tower" title="Visit the Tower">The Tower</button>
                <button id="vault" title="Open your vault">Vault</button>

                <p class="info">This game is still in early development, please keep that in mind.</p>
                <input type="image" id="testEnemy" alt="Enemy" src="assets/img/Dreg.jpg" height="300px" width="250px">
                <br>
                <p id="output"></p>
            </div>

            <div class="director">
                <h1>Director</h1>
                <hr>

                <br>
                <button class="orbit" title="Return to Orbit">Orbit</button>
            </div>

            <div class="tower">
                <h1>The Tower</h1> <br>
                <h3>Rahool</h3>
                <div class="engrams">
                    <button id="whiteEngram">Decrypt a Common Engram</button>
                    <button id="greenEngram">Decrypt a Uncommon Engram</button>
                    <button id="blueEngram">Decrypt a Rare Engram</button>
                    <button id="purpleEngram">Decrypt a Legendary Engram</button>
                    <button id="orangeEngram">Decrypt an Exotic Engram</button>
                </div>

                <br>
                <button class="orbit" title="Return to Orbit">Orbit</button>
            </div>
            
            <div class="vault">
                <h1>Vault</h1>
                <br>
                <button class="orbit" title="Return to Orbit">Orbit</button>
            </div>

        </div>

        <div class="currency">
            <p id="glimmer">Glimmer: 0</p>
            <p id="commonEngram" style="color:#C4BCB4"></p>
            <p id="uncommonEngram" style="color:#347040"></p>
            <p id="rareEngram" style="color:#5076A3"></p>
            <p id="legendaryEngram" style="color:#4E3263"></p>
            <p id="exoticEngram" style="color:#CEAE32"></p>
        </div>
    </div>
</body>
</html>
